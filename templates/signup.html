<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Asakta Vision AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: white;
            overflow: hidden;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group input {
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(31, 41, 55, 0.8);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-glow {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="glass-card p-10 space-y-8 relative">
            <div class="absolute -top-12 -left-12 w-24 h-24 bg-blue-600/20 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-12 -right-12 w-24 h-24 bg-blue-600/10 rounded-full blur-3xl"></div>

            <div class="text-center space-y-3">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg shadow-blue-900/20 mb-2 animate-float">
                    <i class="fa-solid fa-user-plus text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-white">Create an <span class="text-blue-500">Account</span></h1>
            </div>

            {% if error %}
            <div class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl text-sm flex items-center gap-3">
                <i class="fa-solid fa-triangle-exclamation"></i>
                {{ error }}
            </div>
            {% endif %}

            <form action="/signup" method="POST" class="space-y-6">
                <div class="space-y-2 input-group text-sm">
                    <label class="text-gray-400 ml-1 font-medium">Username</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" name="username" class="w-full pl-12 pr-4 py-3.5 rounded-xl text-white outline-none" placeholder="Choose a username" required>
                    </div>
                </div>

                <div class="space-y-2 input-group text-sm">
                    <label class="text-gray-400 ml-1 font-medium">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="password" name="password" class="w-full pl-12 pr-4 py-3.5 rounded-xl text-white outline-none" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="space-y-2 input-group text-sm">
                    <label class="text-gray-400 ml-1 font-medium">Confirm Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="password" name="confirm_password" class="w-full pl-12 pr-4 py-3.5 rounded-xl text-white outline-none" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-glow w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold transition-all mt-2">
                    Complete Registration
                </button>
            </form>

            <div class="text-center mt-6">
                <a href="/login" class="text-sm text-gray-400 hover:text-white transition-colors">Already have an account? <span class="text-blue-500 font-medium">Sign in</span></a>
            </div>
        </div>
    </div>
</body>
</html>
