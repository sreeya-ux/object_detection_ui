<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs - Asakta Vision AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #030712; color: #f8fafc; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <header class="flex justify-between items-center bg-gray-900/50 p-6 rounded-3xl border border-white/5">
            <div class="flex items-center gap-4">
               <a href="/admin" class="text-gray-400 hover:text-white"><i class="fa-solid fa-arrow-left"></i></a>
               <h1 class="text-2xl font-bold">Activity Audit Trail</h1>
            </div>
            <span class="px-4 py-2 bg-blue-500/10 text-blue-400 text-[10px] font-black rounded-xl border border-blue-500/10">SYSTEM MONITOR</span>
        </header>

        <div class="bg-gray-900/40 rounded-3xl border border-white/5 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-white/5 text-[10px] uppercase font-bold tracking-widest text-gray-500">
                        <th class="p-4">Timestamp</th>
                        <th class="p-4">User</th>
                        <th class="p-4">Action</th>
                        <th class="p-4">Details</th>
                    </tr>
                </thead>
                <tbody class="text-xs">
                    {% for log in logs %}
                    <tr class="border-t border-white/5 hover:bg-white/5 transition-colors">
                        <td class="p-4 font-mono text-gray-500">{{ log.timestamp }}</td>
                        <td class="p-4 font-bold text-blue-400">{{ log.user_name }}</td>
                        <td class="p-4"><span class="px-2 py-0.5 bg-gray-800 rounded text-gray-300 font-mono">{{ log.action }}</span></td>
                        <td class="p-4 text-gray-400">{{ log.details }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
